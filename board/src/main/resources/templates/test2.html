      <script>
          function getApi() {
              $.get("http://localhost:8080/api/testApi",
                  // 서버가 필요한 정보를 같이 보냄.
                  {},
                  // 응답이 오면 호출되는 콜백 함수
                  function (data, status) {
                      console.log('=============> ', data)// 전송받은 데이터와 전송 성공 여부를 보여줌.
                      console.log('=============> ', status)// 전송받은 데이터와 전송 성공 여부를 보여줌.
                      data.forEach(function (t) {
                          if (t.jmfldnm.indexOf('기사') > -1) {
                              appendTest(t.jmcd, t.jmfldnm, t.qualgbnm)
                          }
                      });
                  }
              );
          }
          function appendTest(jmcd, jmfldnm, qualgbnm) {
              let btn = $("<button>");
              btn.addClass('list-group-item').addClass('list-group-item-action');
              btn.appendTo('.list-group');
              btn.text('(' + jmcd + ')' + jmfldnm)
              let span = $("<span>");
              span.addClass('badge').addClass('text-bg-primary').addClass('rounded-pill');
              span.text(qualgbnm)
              span.appendTo(btn);
              let a = $("<a>");
              a.addClass('badge').addClass('text-bg-primary').addClass('rounded-pill');
              a.text('X');
              a.appendTo(btn);
          }


      </script>
