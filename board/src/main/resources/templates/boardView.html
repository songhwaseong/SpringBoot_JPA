<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시물 상세페이지</title>
</head>

<style>
    .layout {
        width : 500px;
        margin : 0 auto;
        margin-top : 40px;
    }
</style>

<body>
    <h1 th:text="${board.title}">제목입니다.</h1>
    <p th:text="${board.content}">내용이 들어갈 부분입니다.</p>
    <a th:href="@{/board/modify(id=${board.id})}">수정하기</a>
    <a th:href="@{/board/delete(id=${board.id})}">삭제하기</a>
    <a th:href="@{${board.filepath}}">다운받기</a>
    <a th:href="@{/board/boardList}">돌아가기</a>
</body>
</html>
